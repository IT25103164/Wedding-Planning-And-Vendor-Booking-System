<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - DreamWedding</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="bg-light d-flex flex-column min-vh-100">

  <!-- Navigation -->
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="../index.html">DreamWedding</a>
    </div>
  </nav>

  <!-- Login Form -->
  <div class="container my-auto py-5">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="card auth-card p-4 p-md-5">
          <div class="text-center mb-4">
            <h2 class="fw-bold">Welcome Back</h2>
            <p class="text-muted">Login to manage your wedding plans</p>
          </div>
          
          <form class="needs-validation" novalidate action="dashboard.html">
            <div class="mb-3">
              <label for="email" class="form-label fw-bold">Email Address</label>
              <div class="input-group">
                <span class="input-group-text bg-white"><i class="fa-regular fa-envelope"></i></span>
                <input type="email" class="form-control" id="email" placeholder="name@example.com" required>
                <div class="invalid-feedback">Please enter a valid email.</div>
              </div>
            </div>
            
            <div class="mb-4">
              <label for="password" class="form-label fw-bold d-flex justify-content-between">
                Password
                <a href="#" class="text-primary text-decoration-none small">Forgot Password?</a>
              </label>
              <div class="input-group">
                <span class="input-group-text bg-white"><i class="fa-solid fa-lock"></i></span>
                <input type="password" class="form-control" id="password" placeholder="Enter your password" required>
                <div class="invalid-feedback">Please enter your password.</div>
              </div>
            </div>
            
            <div class="mb-4 form-check">
              <input type="checkbox" class="form-check-input" id="rememberMe">
              <label class="form-check-label text-muted" for="rememberMe">Remember me</label>
            </div>
            
            <button class="btn btn-custom w-100 py-2 mb-3" type="submit">Login</button>
            <a href="admin-dashboard.html" class="btn btn-outline-secondary w-100 py-2 mb-4">Login as Admin</a>
            
            <div class="text-center mb-0">
              <p class="text-muted">Don't have an account? <a href="register.html" class="text-primary fw-bold text-decoration-none">Sign Up</a></p>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/script.js"></script>
</body>
</html>
